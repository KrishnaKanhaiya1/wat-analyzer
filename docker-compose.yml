version: "3.9"

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: wat_analyzer
      POSTGRES_USER: wat_user
      POSTGRES_PASSWORD: wat_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wat_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://wat_user:wat_password@db:5432/wat_analyzer
      SECRET_KEY: change-me-in-production-super-secret-key-2024
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      # Expose full API base (including /api) so the frontend
      # can talk to the backend correctly from inside Docker.
      - VITE_API_URL=http://api:8000/api

volumes:
  postgres_data:
